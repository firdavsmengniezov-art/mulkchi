<div class="gallery-container">
	<!-- Grid layout -->
	<div class="gallery-grid" [class.single]="displayImages.length === 1">
		<!-- Main large image -->
		<div class="main-image" (click)="openLightbox(0)">
			<img [src]="mainImage" alt="Main property view" />
		</div>

		<!-- 4 smaller images grid -->
		<div class="small-images" *ngIf="displayImages.length > 1">
			<div class="img-box" *ngFor="let img of gridImages; let i = index" (click)="openLightbox(i + 1)">
				<img [src]="img" alt="Property view" />
			</div>
		</div>
	</div>

	<!-- Floating button if there are exactly or more than 5 images, or to just view all -->
	<button class="btn-view-all" (click)="openLightbox(0)">
		📱 Barcha rasmlar ({{ displayImages.length }})
	</button>
</div>

<!-- Lightbox Modal -->
<div class="lightbox" *ngIf="lightboxOpen" (click)="closeLightbox()">
	<button class="btn-close" (click)="closeLightbox()">✕</button>

	<button class="nav-btn prev" (click)="prevImage($event)" *ngIf="displayImages.length > 1">‹</button>

	<div class="lightbox-content" (click)="$event.stopPropagation()">
		<img [src]="displayImages[currentIndex]" alt="Fullscreen property view" />
		<div class="counter">{{ currentIndex + 1 }} / {{ displayImages.length }}</div>
	</div>

	<button class="nav-btn next" (click)="nextImage($event)" *ngIf="displayImages.length > 1">›</button>
</div>
