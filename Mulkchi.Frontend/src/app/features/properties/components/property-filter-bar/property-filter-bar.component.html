<div class="filter-bar">

	<!-- Search input with autocomplete -->
	<div class="search-input-wrapper">
		<input placeholder="Shahar, tuman yoki manzil..." [formControl]="searchControl" />
		<div class="mt-2 flex flex-wrap gap-2">
			<button class="btn-filter-more" type="button" (click)="useMyLocation()" [disabled]="isLocating">
				{{ isLocating ? 'Joylashuv olinmoqda...' : '📍 Mening joylashuvim' }}
			</button>
		</div>
		<div class="text-sm text-red-600 mt-2" *ngIf="locationError">
			{{ locationError }}
		</div>
		<!-- Dropdown suggestions -->
		<ul class="autocomplete-dropdown" *ngIf="suggestions.length > 0">
			<li *ngFor="let s of suggestions" (click)="selectSuggestion(s)">
				📍 {{ s }}
			</li>
		</ul>
	</div>

	<!-- ListingType tabs -->
	<div class="listing-tabs">
		<button [class.active]="params.listingType === 'Rent'" (click)="setListingType('Rent')">🏠 Ijara</button>
		<button [class.active]="params.listingType === 'Sale'" (click)="setListingType('Sale')">🏡 Sotish</button>
		<button [class.active]="params.listingType === 'ShortTerm'" (click)="setListingType('ShortTerm')">🏨 Qisqa
			muddatli</button>
	</div>

	<!-- Price range -->
	<div class="price-range">
		<input type="number" placeholder="Min narx" [(ngModel)]="params.minPrice" />
		<span>—</span>
		<input type="number" placeholder="Max narx" [(ngModel)]="params.maxPrice" />
		<select [(ngModel)]="selectedCurrency">
			<option value="UZS">UZS</option>
			<option value="USD">USD</option>
		</select>
	</div>

	<!-- Bedrooms quick filter -->
	<div class="bedrooms-filter">
		<span>Xonalar:</span>
		<button *ngFor="let b of [null,1,2,3,4]" [class.active]="params.bedrooms === b" (click)="setBedrooms(b)">
			{{ b === null ? 'Barchasi' : b === 4 ? '4+' : b }}
		</button>
	</div>

	<!-- More filters + Apply -->
	<div class="filter-actions">
		<button class="btn-filter-more" (click)="openModal()">
			⚙️ Batafsil filtr
		</button>
		<button class="btn-apply" (click)="applyFilters()">
			Qidirish
		</button>
	</div>

</div>
