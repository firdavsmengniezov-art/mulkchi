<div class="review-form">
  <div class="dialog-header">
    <h2 mat-dialog-title>
      <mat-icon>rate_review</mat-icon>
      {{ isEditMode ? 'Sharhni tahrirlash' : 'Sharh qoldiring' }}
    </h2>
    <button mat-icon-button mat-dialog-close (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-content" mat-dialog-content>
    <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()">
      <!-- Overall Rating -->
      <div class="rating-section">
        <label class="rating-label">Umumiy baho</label>
        <app-star-rating
          [rating]="reviewForm.get('overallRating')?.value"
          [readonly]="false"
          (ratingChange)="onRatingChange('overallRating', $event)">
        </app-star-rating>
        @if (getErrorMessage('overallRating')) {
          <div class="error-message">{{ getErrorMessage('overallRating') }}</div>
        }
      </div>

      <!-- Category Ratings -->
      <div class="ratings-grid">
        <div class="rating-item">
          <label>Tozalik</label>
          <app-star-rating
            [rating]="reviewForm.get('cleanlinessRating')?.value"
            [readonly]="false"
            (ratingChange)="onRatingChange('cleanlinessRating', $event)">
          </app-star-rating>
        </div>

        <div class="rating-item">
          <label>Joylashuv</label>
          <app-star-rating
            [rating]="reviewForm.get('locationRating')?.value"
            [readonly]="false"
            (ratingChange)="onRatingChange('locationRating', $event)">
          </app-star-rating>
        </div>

        <div class="rating-item">
          <label>Qiymat</label>
          <app-star-rating
            [rating]="reviewForm.get('valueRating')?.value"
            [readonly]="false"
            (ratingChange)="onRatingChange('valueRating', $event)">
          </app-star-rating>
        </div>

        <div class="rating-item">
          <label>Kommunikatsiya</label>
          <app-star-rating
            [rating]="reviewForm.get('communicationRating')?.value"
            [readonly]="false"
            (ratingChange)="onRatingChange('communicationRating', $event)">
          </app-star-rating>
        </div>

        <div class="rating-item">
          <label>Aniqlik</label>
          <app-star-rating
            [rating]="reviewForm.get('accuracyRating')?.value"
            [readonly]="false"
            (ratingChange)="onRatingChange('accuracyRating', $event)">
          </app-star-rating>
        </div>
      </div>

      <!-- Comment -->
      <div class="comment-section">
        <mat-form-field appearance="outline" class="comment-field">
          <mat-label>Izoh</mat-label>
          <textarea 
            matInput 
            formControlName="comment"
            rows="4"
            placeholder="Mulk haqida fikringizni yozing..."
            [maxLength]="500">
          </textarea>
          @if (getErrorMessage('comment')) {
            <mat-error>{{ getErrorMessage('comment') }}</mat-error>
          }
        </mat-form-field>
        <div class="char-count">
          {{ reviewForm.get('comment')?.value?.length || 0 }}/500
        </div>
      </div>
    </form>
  </div>

  <div class="dialog-actions" mat-dialog-actions>
    <button mat-button (click)="onCancel()">
      Bekor qilish
    </button>
    <button 
      mat-raised-button 
      color="primary" 
      (click)="onSubmit()"
      [disabled]="reviewForm.invalid || isLoading">
      @if (isLoading) {
        <mat-spinner diameter="16"></mat-spinner>
      }
      {{ isEditMode ? 'Yangilash' : 'Yuborish' }}
    </button>
  </div>
</div>
