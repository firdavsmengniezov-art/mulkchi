<!-- Register Page -->
<div class="auth-page">
  <div class="auth-container">
    
    <!-- Left Side - Branding & Features -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-logo">
          <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
            <path d="M11.47 3.84a.75.75 0 011.06 0l8.99 8.99a.75.75 0 11-1.06 1.06l-1.46-1.46V20.25a1.5 1.5 0 01-1.5 1.5H6.5a1.5 1.5 0 01-1.5-1.5V12.43L3.53 13.9a.75.75 0 11-1.06-1.06l8.99-8.99z"/>
          </svg>
        </div>
        <h1 class="brand-name">Mulkchi</h1>
      </div>
      
      <div class="auth-hero">
        <h2 class="hero-title">Ro'yxatdan o'ting</h2>
        <p class="hero-subtitle">Yangi hisob yarating va mulklarni boshqaring</p>
        
        <div class="feature-list">
          <div class="feature-item">
            <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>Bepul ro'yxatdan o'tish</span>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>Barcha imkoniyatlar</span>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>24/7 qo'llab-quvvatlash</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side - Register Form -->
    <div class="auth-right">
      <div class="auth-form-container">
        
        <!-- Header -->
        <header class="auth-header">
          <h1 class="auth-title">Ro'yxatdan o'tish</h1>
          <p class="auth-subtitle">Yangi hisob yarating</p>
        </header>

        <!-- Error Message -->
        @if (errorMsg) {
          <div class="error-message">
            <svg class="error-icon" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span>{{ errorMsg }}</span>
          </div>
        }

        <!-- Register Form -->
        <form class="auth-form" (submit)="$event.preventDefault(); register()">
          
          <!-- Name Fields -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">Ism</label>
              <div class="input-group">
                <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <input 
                  type="text" 
                  id="firstName"
                  [(ngModel)]="firstName" 
                  name="firstName"
                  placeholder="Ismingiz"
                  class="form-input"
                  required
                />
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="lastName">Familiya</label>
              <div class="input-group">
                <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <input 
                  type="text" 
                  id="lastName"
                  [(ngModel)]="lastName" 
                  name="lastName"
                  placeholder="Familiyangiz"
                  class="form-input"
                  required
                />
              </div>
            </div>
          </div>

          <!-- Email Field -->
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <div class="input-group">
              <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15A2.25 2.25 0 002.25 6.75m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.909A2.25 2.25 0 012.25 6.993V6.75"/>
              </svg>
              <input 
                type="email" 
                id="email"
                [(ngModel)]="email" 
                name="email"
                placeholder="email@example.com"
                class="form-input"
                required
              />
            </div>
          </div>

          <!-- Phone Field -->
          <div class="form-group">
            <label class="form-label" for="phone">Telefon</label>
            <div class="input-group">
              <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
              <input 
                type="tel" 
                id="phone"
                [(ngModel)]="phone" 
                name="phone"
                placeholder="+998 XX XXX XX XX"
                class="form-input"
                required
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label" for="password">Parol</label>
            <div class="input-group">
              <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 0h10.5a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H6.75a1.5 1.5 0 01-1.5-1.5V12a1.5 1.5 0 011.5-1.5z"/>
              </svg>
              <input 
                [type]="showPassword ? 'text' : 'password'" 
                id="password"
                [(ngModel)]="password" 
                name="password"
                placeholder="Parolni kiriting"
                class="form-input"
                required
              />
              <button 
                type="button" 
                (click)="togglePasswordVisibility()"
                class="password-toggle"
                aria-label="Toggle password visibility"
              >
                @if (showPassword) {
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18M10.477 10.48A3 3 0 0013.52 13.52M9.88 5.09A10.93 10.93 0 0112 4.875c4.5 0 8.258 2.943 9.542 6.995a11.052 11.052 0 01-2.104 3.292M6.228 6.228A10.944 10.944 0 002.458 11.87a11.052 11.052 0 005.243 6.128A10.92 10.92 0 0012 19.125c1.733 0 3.373-.402 4.83-1.117"/>
                  </svg>
                } @else {
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5.063 12 5.063c4.477 0 8.268 2.88 9.542 6.937-1.274 4.057-5.065 6.938-9.542 6.938-4.477 0-8.268-2.88-9.542-6.938z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Confirm Password Field -->
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Parolni tasdiqlang</label>
            <div class="input-group">
              <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 0h10.5a1.5 1.5 0 011.5 1.5v7.5a1.5 1.5 0 01-1.5 1.5H6.75a1.5 1.5 0 01-1.5-1.5V12a1.5 1.5 0 011.5-1.5z"/>
              </svg>
              <input 
                [type]="showConfirmPassword ? 'text' : 'password'" 
                id="confirmPassword"
                [(ngModel)]="confirmPassword" 
                name="confirmPassword"
                placeholder="Parolni qayta kiriting"
                class="form-input"
                required
              />
              <button 
                type="button" 
                (click)="toggleConfirmPasswordVisibility()"
                class="password-toggle"
                aria-label="Toggle confirm password visibility"
              >
                @if (showConfirmPassword) {
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18M10.477 10.48A3 3 0 0013.52 13.52M9.88 5.09A10.93 10.93 0 0112 4.875c4.5 0 8.258 2.943 9.542 6.995a11.052 11.052 0 01-2.104 3.292M6.228 6.228A10.944 10.944 0 002.458 11.87a11.052 11.052 0 005.243 6.128A10.92 10.92 0 0012 19.125c1.733 0 3.373-.402 4.83-1.117"/>
                  </svg>
                } @else {
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5.063 12 5.063c4.477 0 8.268 2.88 9.542 6.937-1.274 4.057-5.065 6.938-9.542 6.938-4.477 0-8.268-2.88-9.542-6.938z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Terms Checkbox -->
          <div class="form-checkbox">
            <input type="checkbox" id="terms" [(ngModel)]="acceptTerms" name="terms" class="checkbox-input">
            <label for="terms" class="checkbox-label">
              <a href="#" class="terms-link">Foydalanish shartlari</a> va <a href="#" class="terms-link">Maxfiylik siyosati</a> bilan tanishaman
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" [disabled]="loading || !acceptTerms" class="btn btn-primary btn-full">
            @if (loading) {
              <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span>Ro'yxatdan o'tilmoqda...</span>
            } @else {
              <span>Ro'yxatdan o'tish</span>
            }
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">
          <span>yoki</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button type="button" class="btn btn-social btn-google">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google bilan ro'yxatdan o'tish
          </button>
          
          <button type="button" class="btn btn-social btn-facebook">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook bilan ro'yxatdan o'tish
          </button>
        </div>

        <!-- Login Link -->
        <div class="auth-footer">
          <p>Allaqachon hisobingiz bormi? <a routerLink="/login" class="auth-link">Kirish</a></p>
        </div>
        
      </div>
    </div>
  </div>
</div>
