<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <span class="brand-icon">🏠</span>
      <span class="brand-name">Mulkchi</span>
    </div>
    <h2>Minglab xaridorlar bilan bog'laning</h2>
    <div class="auth-features">
      <div class="feat">✅ Bepul ro'yxatdan o'tish</div>
      <div class="feat">✅ Darhol e'lon berish</div>
      <div class="feat">✅ Xavfsiz to'lovlar</div>
      <div class="feat">✅ 24/7 qo'llab-quvvatlash</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h1>Ro'yxatdan o'ting</h1>
      <p>Yangi akkaunt yarating</p>
      @if (errorMsg) {
        <div class="error-msg">⚠️ {{ errorMsg }}</div>
      }
      <div class="form-row">
        <div class="form-group">
          <label>Ism</label>
          <input type="text" [(ngModel)]="firstName" placeholder="Ism">
        </div>
        <div class="form-group">
          <label>Familiya</label>
          <input type="text" [(ngModel)]="lastName" placeholder="Familiya">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Telefon</label>
        <input type="tel" [(ngModel)]="phone" placeholder="+998 90 123 45 67">
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" [(ngModel)]="password" placeholder="Kamida 8 belgi">
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select [(ngModel)]="selectedRole">
          <option [value]="0">👤 Mehmon (xarid qiluvchi / ijara oluvchi)</option>
          <option [value]="1">🏠 Uy egasi (sotuvchi / ijara beruvchi)</option>
        </select>
      </div>
      <button class="btn-submit" (click)="register()" [disabled]="loading">
        {{ loading ? 'Ro\'yxatdan o\'tilmoqda...' : 'Ro\'yxatdan o\'tish' }}
      </button>
      <div class="auth-switch">
        Akkauntingiz bormi?
        <a routerLink="/login">Kiring</a>
      </div>
    </div>
  </div>
</div>
