<app-navbar></app-navbar>

<!-- HERO -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>{{ 'HOME.HERO_TITLE' | translate }}</h1>
    <div class="search-bar">
      <form>
        <select [(ngModel)]="searchRegion" name="searchRegion">
          <option value="">{{ 'HOME.SELECT_REGION' | translate }}</option>
          <option>{{ 'HOME.TASHKENT' | translate }}</option>
          <option>{{ 'HOME.SAMARKAND' | translate }}</option>
          <option>{{ 'HOME.BUKHARA' | translate }}</option>
          <option>{{ 'HOME.NAMANGAN' | translate }}</option>
          <option>{{ 'HOME.ANDIJAN' | translate }}</option>
          <option>{{ 'HOME.FERGANA' | translate }}</option>
        </select>
        <select [(ngModel)]="searchType" name="searchType">
          <option value="">{{ 'HOME.PROPERTY_TYPE' | translate }}</option>
          <option value="Apartment">{{ 'HOME.APARTMENT' | translate }}</option>
          <option value="House">{{ 'HOME.HOUSE' | translate }}</option>
          <option value="Office">{{ 'HOME.OFFICE' | translate }}</option>
        </select>
        <input type="text" [placeholder]="'HOME.PRICE_RANGE' | translate" [(ngModel)]="searchPrice" name="searchPrice">
      </form>
      <button class="btn-primary" (click)="search()">{{ 'HOME.SEARCH' | translate }}</button>
    </div>
  </div>
</section>

<!-- YANGI E'LONLAR -->
<section class="listings">
  <div class="container">
    <h2>{{ 'HOME.NEW_LISTINGS' | translate }}</h2>
    @if (loading) { <div class="loading">{{ 'COMMON.LOADING' | translate }}</div> }
    <div class="cards-grid">
      @for (p of properties; track p.id) {
        <app-property-card [property]="p"></app-property-card>
      }
    </div>
  </div>
</section>

<!-- AI BANNER -->
<section class="ai-banner">
  <div class="container ai-inner">
    <div class="ai-left">
      <span class="ml-badge">ML.NET</span>
      <h3>{{ 'HOME.AI_BANNER_TITLE' | translate }}</h3>
      <p>{{ 'HOME.AI_BANNER_DESC' | translate }}</p>
    </div>
    <button class="btn-primary" routerLink="/ai-price">{{ 'HOME.AI_CALCULATE' | translate }}</button>
  </div>
</section>

<!-- FLOATING CHAT -->
<button class="chat-float" routerLink="/chat">💬 {{ 'NAV.CHAT' | translate }}</button>
