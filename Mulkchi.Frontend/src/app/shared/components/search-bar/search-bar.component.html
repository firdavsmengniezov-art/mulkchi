<!-- Search Bar - PropTech Design System -->
<div class="search-bar">
  <!-- Main Search Row -->
  <div class="search-main">
    <!-- Location Input -->
    <div class="search-field location-field">
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <input 
        type="text" 
        [(ngModel)]="location"
        placeholder="Shahar, tuman yoki manzil"
        class="field-input"
      />
      @if (location) {
      <button class="clear-btn" (click)="location = ''">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      }
    </div>

    <!-- Divider -->
    <div class="field-divider"></div>

    <!-- Property Type Dropdown -->
    <div class="search-field type-field">
      <svg class="field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
      </svg>
      <div class="dropdown-trigger" (click)="toggleFilters()">
        <span class="field-label">Mulk turi</span>
        <span class="field-value">{{ getSelectedTypeLabel() }}</span>
      </div>
      <svg class="dropdown-arrow" [class.rotated]="showFilters" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

    <!-- Search Button -->
    <button class="search-btn" (click)="onSearch()">
      <svg class="search-btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/>
      </svg>
      <span>Qidirish</span>
    </button>
  </div>

  <!-- Expanded Filters -->
  @if (showFilters) {
  <div class="search-filters">
    <!-- Property Type Options -->
    <div class="filter-section">
      <h4 class="filter-title">Mulk turi</h4>
      <div class="type-options">
        @for (type of propertyTypes; track type.value) {
        <button 
          class="type-option"
          [class.active]="propertyType === type.value"
          (click)="propertyType = type.value">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="type.icon"/>
          </svg>
          <span>{{ type.label }}</span>
        </button>
        }
      </div>
    </div>

    <!-- Price Range -->
    <div class="filter-section">
      <div class="price-header">
        <h4 class="filter-title">Narx oralig'i</h4>
        <span class="price-display">{{ minPrice | number }} - {{ maxPrice | number }} so'm</span>
      </div>
      <div class="price-slider">
        <input 
          type="range" 
          [(ngModel)]="minPrice" 
          [min]="0" 
          [max]="maxPrice"
          class="slider slider-min"
        />
        <input 
          type="range" 
          [(ngModel)]="maxPrice" 
          [min]="minPrice" 
          [max]="1000000"
          class="slider slider-max"
        />
        <div class="slider-track"></div>
        <div class="slider-range" [style.left.%]="(minPrice / 1000000) * 100" [style.width.%]="((maxPrice - minPrice) / 1000000) * 100"></div>
      </div>
      <div class="price-inputs">
        <div class="price-input-group">
          <label>Dan</label>
          <input type="number" [(ngModel)]="minPrice" class="price-input" />
        </div>
        <div class="price-input-group">
          <label>Gacha</label>
          <input type="number" [(ngModel)]="maxPrice" class="price-input" />
        </div>
      </div>
    </div>

    <!-- Apply Button -->
    <button class="apply-btn" (click)="onSearch(); showFilters = false">
      Filterni qo'llash
    </button>
  </div>
  }
</div>
