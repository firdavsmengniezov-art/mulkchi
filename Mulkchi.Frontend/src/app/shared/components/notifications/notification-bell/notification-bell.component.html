<button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="notification-bell">
  <mat-icon>notifications</mat-icon>
  <span class="badge" *ngIf="unreadCount > 0" [attr.data-badge]="unreadCount">{{ unreadCount }}</span>
</button>

<mat-menu #notificationMenu="matMenu" xPosition="before" class="notification-dropdown">
  <div class="notification-header">
    <h3>Bildirishnomalar</h3>
    <div class="header-actions">
      <button mat-icon-button (click)="markAllAsRead()" [disabled]="unreadCount === 0" matTooltip="Barchasini o'qilgan deb belgilash">
        <mat-icon>done_all</mat-icon>
      </button>
    </div>
  </div>
  
  <mat-divider></mat-divider>

  <div class="notification-list" *ngIf="!loading; else loadingTemplate">
    <div 
      *ngFor="let notification of notifications; trackBy: trackByNotificationId" 
      class="notification-item"
      [class.unread]="!notification.isRead"
      (click)="onNotificationClick(notification)">
      
      <div class="notification-icon">
        <mat-icon [color]="getNotificationColor(notification.type)">
          {{ getNotificationIcon(notification.type) }}
        </mat-icon>
      </div>
      
      <div class="notification-content">
        <div class="notification-title">
          {{ getLocalizedTitle(notification) }}
        </div>
        <div class="notification-message">
          {{ getLocalizedBody(notification) }}
        </div>
        <div class="notification-time">
          {{ notification.createdDate | relativeTime }}
        </div>
      </div>
      
      <div class="notification-actions">
        <button 
          mat-icon-button 
          (click)="deleteNotification(notification, $event)"
          matTooltip="O'chirish"
          class="delete-btn">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="notifications.length === 0">
      <mat-icon>notifications_none</mat-icon>
      <p>Bildirishnomalar yo'q</p>
    </div>
  </div>

  <mat-divider *ngIf="notifications.length > 0"></mat-divider>

  <div class="notification-footer" *ngIf="notifications.length > 0">
    <button mat-button (click)="goToNotifications()" class="view-all-btn">
      Barchasini ko'rish
    </button>
  </div>
</mat-menu>

<ng-template #loadingTemplate>
  <div class="loading-state">
    <mat-spinner diameter="30"></mat-spinner>
    <p>Yuklanmoqda...</p>
  </div>
</ng-template>
