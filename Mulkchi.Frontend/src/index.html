<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MulkchiFrontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
  <app-root></app-root>
  <script>
    // Global function for property detail navigation from map popup
    window.navigateToPropertyDetail = function(propertyId) {
      const event = new CustomEvent('navigateToProperty', { detail: { propertyId } });
      window.dispatchEvent(event);
    };
  </script>
</body>
</html>
