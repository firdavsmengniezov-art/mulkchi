name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Mulkchi.Api/**'
      - 'Mulkchi.Api.Tests.Unit/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Mulkchi.Api/**'

jobs:
  build-and-test:
    name: Build va Test
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish
        uses: actions/checkout@v4

      - name: .NET 8 o'rnatish
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: NuGet paketlarni tiklash
        run: dotnet restore Mulkchi.sln

      - name: Build (Release mode)
        run: dotnet build Mulkchi.sln --no-restore --configuration Release

      - name: Unit testlarni ishga tushirish
        run: |
          dotnet test Mulkchi.Api.Tests.Unit/ \
            --no-build --no-restore \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Test natijalarini saqlash
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: '**/TestResults/**'
          retention-days: 7

      - name: Xavfsizlik tekshiruvi — secret bormikan
        run: |
          if grep -rn "SecretKey\s*=\s*\"[^\"]\{8,\}\"" \
              Mulkchi.Api/appsettings.json; then
            echo "⚠️ appsettings.json da real secret bor!"
            exit 1
          fi
          echo "✅ Secret topilmadi"
